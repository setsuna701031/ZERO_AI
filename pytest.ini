[pytest]
testpaths = tests

norecursedirs =
    .git
    .pytest_cache
    .test_tmp
    zero_ai_clone
    zero_ai_target
    workspace
    data
    logs
    run
    venv
    .venv
    env

addopts =
    -ra
    --ignore=tests/task/test_task_models.py
    --ignore=tests/task/test_task_storage.py
    --ignore=tests/test_chat.py
    --ignore=tests/test_llm_tool_decision.py
    --ignore=tests/test_memory.py
    --ignore=tests/test_memory_engine.py
    --ignore=tests/test_repo_edit_agent_bridge.py
    --ignore=tests/test_repo_edit_agent_review_adapter.py
    --ignore=tests/test_repo_edit_integration.py
    --ignore=tests/test_repo_edit_review_flow.py
    --ignore=tests/test_repo_edit_task_intent.py
    --ignore=tests/test_repo_edit_tool.py
    --ignore=tests/test_router.py

markers =
    runtime: runtime/mainline tests
    integration: integration tests requiring multiple modules
    external: tests requiring external services such as Flask or local servers
    legacy: tests for deprecated module paths or old architecture