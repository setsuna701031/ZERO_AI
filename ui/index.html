<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ZERO Local Agent</title>
    <style>
        :root {
            color-scheme: dark;
            --bg-main: #05070b;
            --bg-page: #07101d;
            --bg-card: #0f1624;
            --bg-card-2: #0a1018;
            --bg-input: #101722;
            --border: #25344a;
            --border-soft: #1b2738;
            --blue: #2f86ff;
            --blue-2: #65b8ff;
            --green: #54d18f;
            --yellow: #ffd978;
            --red: #ff9aa5;
            --text: #f3f6fb;
            --muted: #9da8b6;
            --muted-2: #6f8096;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background:
                radial-gradient(circle at 12% 0%, rgba(47, 134, 255, 0.16), transparent 28%),
                radial-gradient(circle at 100% 10%, rgba(84, 209, 143, 0.08), transparent 25%),
                linear-gradient(180deg, #05070b 0%, #07101d 100%);
            color: var(--text);
            font-family: Consolas, "Courier New", "Noto Sans TC", monospace;
        }

        .page {
            width: min(1480px, calc(100vw - 40px));
            margin: 0 auto;
            padding: 24px 0 36px;
        }

        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 18px;
            margin-bottom: 22px;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .logo-mark {
            width: 76px;
            height: 76px;
            border-radius: 50%;
            border: 2px solid rgba(47, 134, 255, 0.55);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 24px rgba(47, 134, 255, 0.2);
            position: relative;
        }

        .logo-mark::before,
        .logo-mark::after {
            content: "";
            position: absolute;
            inset: 6px;
            border-radius: 50%;
            border: 1px dashed rgba(101, 184, 255, 0.28);
        }

        .logo-text {
            font-size: 20px;
            font-weight: 900;
            letter-spacing: 1px;
            z-index: 1;
        }

        .brand-title {
            line-height: 1.35;
        }

        .brand-title strong {
            display: block;
            font-size: 24px;
            letter-spacing: 0.6px;
        }

        .brand-title span {
            display: block;
            color: var(--muted);
            font-size: 13px;
            margin-top: 2px;
        }

        .top-status {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .online-pill {
            border: 1px solid rgba(84, 209, 143, 0.28);
            background: rgba(84, 209, 143, 0.08);
            color: #a5f2c1;
            padding: 9px 14px;
            border-radius: 999px;
            font-size: 13px;
            font-weight: 700;
        }

        .online-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--green);
            margin-right: 8px;
            box-shadow: 0 0 10px rgba(84, 209, 143, 0.8);
        }

        .shell {
            display: grid;
            grid-template-columns: minmax(0, 1fr) 340px;
            gap: 22px;
            align-items: stretch;
        }

        .left-column,
        .right-column {
            min-width: 0;
        }

        .input-row {
            display: grid;
            grid-template-columns: minmax(0, 1fr) 90px;
            gap: 8px;
            align-items: stretch;
            margin-bottom: 14px;
        }

        #userInput {
            min-height: 44px;
            height: 44px;
            padding: 0 16px;
            border: 1px solid #708199;
            border-radius: 12px;
            background: rgba(16, 23, 34, 0.88);
            color: var(--text);
            font-size: 14px;
            outline: none;
            box-shadow: inset 0 0 18px rgba(0, 0, 0, 0.22);
        }

        #userInput:focus {
            border-color: var(--blue-2);
            box-shadow:
                0 0 0 2px rgba(101, 184, 255, 0.15),
                inset 0 0 18px rgba(0, 0, 0, 0.22);
        }

        button {
            min-width: 90px;
            height: 44px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(180deg, #3b8dff, #2369d6);
            color: white;
            font-size: 15px;
            font-weight: 800;
            cursor: pointer;
            padding: 0 16px;
            box-shadow: 0 12px 28px rgba(47, 134, 255, 0.25);
        }

        button:hover {
            background: linear-gradient(180deg, #4e98ff, #2d73df);
        }

        button:disabled {
            cursor: not-allowed;
            opacity: 0.65;
        }

        .panel {
            border: 1px solid var(--border);
            border-radius: 16px;
            background:
                linear-gradient(180deg, rgba(15, 22, 36, 0.94), rgba(8, 13, 20, 0.94));
            padding: 14px;
            box-shadow:
                0 0 0 1px rgba(47, 134, 255, 0.05),
                0 18px 50px rgba(0, 0, 0, 0.2);
        }

        .panel-title {
            color: var(--blue-2);
            font-size: 15px;
            margin-bottom: 12px;
            font-weight: 800;
        }

        .meta-grid {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 8px;
            margin-bottom: 12px;
        }

        .meta-card {
            border: 1px solid var(--border-soft);
            border-radius: 12px;
            background: rgba(10, 16, 24, 0.92);
            padding: 10px 11px;
            min-height: 62px;
        }

        .meta-label {
            color: #8ea0b5;
            font-size: 11px;
            margin-bottom: 6px;
        }

        .meta-value {
            color: var(--text);
            font-size: 13px;
            line-height: 1.4;
            word-break: break-word;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            min-height: 28px;
            padding: 0 10px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 800;
            letter-spacing: 0.3px;
        }

        .status-success {
            background: rgba(40, 167, 69, 0.16);
            border: 1px solid rgba(40, 167, 69, 0.35);
            color: #8ee6a4;
        }

        .status-warning {
            background: rgba(255, 193, 7, 0.14);
            border: 1px solid rgba(255, 193, 7, 0.35);
            color: var(--yellow);
        }

        .status-fail {
            background: rgba(220, 53, 69, 0.16);
            border: 1px solid rgba(220, 53, 69, 0.35);
            color: var(--red);
        }

        .summary-box,
        .warning-box,
        .error-box,
        .result-box {
            border-radius: 13px;
            border: 1px solid var(--border-soft);
            padding: 12px 14px;
            white-space: pre-wrap;
            word-break: break-word;
            line-height: 1.7;
            margin-top: 10px;
        }

        .summary-box {
            background: rgba(8, 15, 23, 0.92);
            color: #dce7f3;
            height: 110px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .warning-box {
            background: rgba(138, 103, 10, 0.18);
            border-color: rgba(255, 193, 7, 0.28);
            color: #ffe7a3;
        }

        .error-box {
            background: rgba(120, 20, 28, 0.22);
            border-color: rgba(220, 53, 69, 0.35);
            color: #ffd3d8;
        }

        .result-box {
            background: rgba(6, 10, 16, 0.94);
            color: #f4f7fb;
            height: 430px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .section-title {
            color: var(--blue-2);
            font-size: 13px;
            margin-bottom: 8px;
            font-weight: 800;
            flex: 0 0 auto;
        }

        #summaryBox,
        #resultBox {
            flex: 1 1 auto;
            overflow: auto;
            min-height: 0;
        }

        .muted {
            color: var(--muted);
        }

        details {
            margin-top: 12px;
        }

        summary {
            cursor: pointer;
            color: var(--blue-2);
            user-select: none;
            font-size: 13px;
        }

        pre {
            margin: 10px 0 0;
            padding: 12px;
            border-radius: 10px;
            background: #0a0d12;
            border: 1px solid #202734;
            overflow-x: auto;
            white-space: pre-wrap;
            word-break: break-word;
            line-height: 1.55;
            color: #d9e3ef;
            max-height: 240px;
        }

        .hint {
            margin-top: 10px;
            color: #93a0b0;
            font-size: 12px;
        }

        .persona-card {
            border: 1px solid rgba(47, 134, 255, 0.55);
            border-radius: 18px;
            background:
                linear-gradient(180deg, rgba(13, 25, 43, 0.94), rgba(7, 11, 18, 0.96));
            padding: 12px;
            box-shadow:
                0 0 0 1px rgba(101, 184, 255, 0.14),
                0 0 32px rgba(47, 134, 255, 0.16),
                0 22px 50px rgba(0, 0, 0, 0.28);
            height: 100%;
            min-height: 626px;
            display: flex;
            flex-direction: column;
            transition: border-color 160ms ease, box-shadow 160ms ease;
        }

        .persona-card.persona-state-thinking {
            border-color: rgba(255, 217, 120, 0.65);
            box-shadow:
                0 0 0 1px rgba(255, 217, 120, 0.14),
                0 0 34px rgba(255, 217, 120, 0.15),
                0 22px 50px rgba(0, 0, 0, 0.28);
        }

        .persona-card.persona-state-error {
            border-color: rgba(255, 154, 165, 0.7);
            box-shadow:
                0 0 0 1px rgba(255, 154, 165, 0.12),
                0 0 34px rgba(255, 154, 165, 0.15),
                0 22px 50px rgba(0, 0, 0, 0.28);
        }

        .persona-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 10px;
            padding: 0 2px;
        }

        .persona-title {
            color: var(--text);
            font-size: 14px;
            font-weight: 900;
        }

        .persona-state {
            color: var(--blue-2);
            background: rgba(47, 134, 255, 0.14);
            border: 1px solid rgba(47, 134, 255, 0.22);
            padding: 6px 10px;
            border-radius: 6px;
            font-weight: 900;
            font-size: 12px;
            letter-spacing: 0.4px;
            min-width: 68px;
            text-align: center;
            transition: color 160ms ease, background 160ms ease, border-color 160ms ease;
        }

        .persona-state.state-idle {
            color: var(--blue-2);
            background: rgba(47, 134, 255, 0.14);
            border-color: rgba(47, 134, 255, 0.22);
        }

        .persona-state.state-thinking {
            color: var(--yellow);
            background: rgba(255, 193, 7, 0.12);
            border-color: rgba(255, 193, 7, 0.35);
        }

        .persona-state.state-running {
            color: #8ee6a4;
            background: rgba(84, 209, 143, 0.12);
            border-color: rgba(84, 209, 143, 0.35);
        }

        .persona-state.state-error {
            color: var(--red);
            background: rgba(220, 53, 69, 0.16);
            border-color: rgba(220, 53, 69, 0.35);
        }

        .persona-visual {
            position: relative;
            flex: 1;
            min-height: 540px;
            border: 1px solid rgba(101, 184, 255, 0.2);
            border-radius: 12px;
            overflow: hidden;
            background:
                linear-gradient(180deg, rgba(5, 9, 15, 0.14), rgba(5, 9, 15, 0.2)),
                url("/assets/persona/zero_v1/circuit_bg.png") center center / cover no-repeat;
        }

        .persona-visual::before {
            content: "";
            position: absolute;
            inset: 0;
            background:
                radial-gradient(circle at 50% 35%, rgba(101, 184, 255, 0.12), transparent 38%),
                linear-gradient(180deg, rgba(5, 9, 15, 0.08), rgba(5, 9, 15, 0.62));
            pointer-events: none;
            z-index: 1;
        }

        .persona-visual::after {
            content: "";
            position: absolute;
            inset: 0;
            border-radius: 12px;
            box-shadow: inset 0 0 38px rgba(0, 0, 0, 0.62);
            pointer-events: none;
            z-index: 3;
        }

        .persona-scanline {
            position: absolute;
            left: 0;
            right: 0;
            top: -40%;
            height: 34%;
            z-index: 4;
            background: linear-gradient(
                180deg,
                transparent 0%,
                rgba(101, 184, 255, 0.02) 20%,
                rgba(101, 184, 255, 0.14) 50%,
                rgba(101, 184, 255, 0.02) 80%,
                transparent 100%
            );
            opacity: 0;
            pointer-events: none;
        }

        .persona-card.persona-state-thinking .persona-scanline,
        .persona-card.persona-state-running .persona-scanline {
            opacity: 1;
            animation: scanlineMove 1.8s linear infinite;
        }

        @keyframes scanlineMove {
            from {
                transform: translateY(0);
            }
            to {
                transform: translateY(420%);
            }
        }

        #personaImage {
            position: absolute;
            z-index: 2;
            left: 50%;
            bottom: -12px;
            transform: translateX(-50%);
            width: min(97%, 388px);
            max-height: 98%;
            object-fit: contain;
            object-position: bottom center;
            filter:
                drop-shadow(0 22px 18px rgba(0, 0, 0, 0.48))
                drop-shadow(0 0 16px rgba(47, 134, 255, 0.12));
            user-select: none;
            pointer-events: none;
        }

        .persona-footer {
            margin-top: 10px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .persona-mini-card {
            border: 1px solid var(--border-soft);
            background: rgba(8, 15, 23, 0.88);
            border-radius: 11px;
            padding: 9px 11px;
        }

        .persona-mini-label {
            color: var(--muted-2);
            font-size: 11px;
            margin-bottom: 4px;
        }

        .persona-mini-value {
            color: var(--text);
            font-size: 12px;
            line-height: 1.4;
        }

        .footer-line {
            margin-top: 18px;
            color: var(--muted-2);
            font-size: 11px;
            text-align: center;
            letter-spacing: 0.2px;
        }

        @media (max-width: 1180px) {
            .shell {
                grid-template-columns: 1fr;
            }

            .persona-card {
                min-height: 580px;
            }

            .persona-visual {
                min-height: 480px;
            }

            #personaImage {
                width: min(74%, 388px);
            }
        }

        @media (max-width: 900px) {
            .meta-grid {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }
        }

        @media (max-width: 720px) {
            .page {
                width: min(100vw - 20px, 1480px);
                padding-top: 14px;
            }

            .topbar {
                align-items: flex-start;
                flex-direction: column;
            }

            .input-row {
                grid-template-columns: 1fr;
            }

            button {
                width: 100%;
            }

            .meta-grid {
                grid-template-columns: 1fr;
            }

            .summary-box {
                height: 92px;
            }

            .result-box {
                height: 320px;
            }

            .persona-card {
                min-height: 520px;
            }

            .persona-visual {
                min-height: 420px;
            }

            #personaImage {
                width: min(95%, 360px);
            }
        }
    </style>
</head>
<body>
    <div class="page">
        <div class="topbar">
            <div class="brand">
                <div class="logo-mark">
                    <div class="logo-text">ZERO</div>
                </div>
                <div class="brand-title">
                    <strong>ZERO Local Agent</strong>
                    <span>智能助手 v1.0.0 / Local Web UI Bridge</span>
                </div>
            </div>

            <div class="top-status">
                <div class="online-pill"><span class="online-dot"></span>系統在線</div>
            </div>
        </div>

        <div class="shell">
            <main class="left-column">
                <div class="input-row">
                    <input
                        id="userInput"
                        type="text"
                        placeholder="請直接輸入文字，例如：status / tasks / files / drop hello"
                        autocomplete="off"
                    />
                    <button id="sendBtn">送出</button>
                </div>

                <div class="panel">
                    <div class="panel-title">回應結果</div>

                    <div class="meta-grid">
                        <div class="meta-card">
                            <div class="meta-label">狀態</div>
                            <div id="statusBadge" class="status-badge status-success">尚未送出</div>
                        </div>
                        <div class="meta-card">
                            <div class="meta-label">模式</div>
                            <div id="modeValue" class="meta-value muted">未知</div>
                        </div>
                        <div class="meta-card">
                            <div class="meta-label">模型</div>
                            <div id="modelValue" class="meta-value muted">未知</div>
                        </div>
                        <div class="meta-card">
                            <div class="meta-label">LLM 狀態</div>
                            <div id="llmStateValue" class="meta-value muted">未知</div>
                        </div>
                    </div>

                    <div class="summary-box">
                        <div class="section-title">摘要</div>
                        <div id="summaryBox" class="muted">尚未送出請求。</div>
                    </div>

                    <div id="warningWrapper" class="warning-box" style="display: none;">
                        <div class="section-title">警告</div>
                        <div id="warningBox"></div>
                    </div>

                    <div id="errorWrapper" class="error-box" style="display: none;">
                        <div class="section-title">錯誤</div>
                        <div id="errorBox"></div>
                    </div>

                    <div class="result-box">
                        <div class="section-title">主內容</div>
                        <div id="resultBox">請先輸入內容。</div>
                    </div>

                    <details>
                        <summary>查看原始 JSON</summary>
                        <pre id="rawJsonBox">{}</pre>
                    </details>

                    <div class="hint">
                        可先測：<code>status</code>、<code>tasks</code>、<code>files</code>、<code>inbox</code>、<code>drop hello</code>。
                    </div>
                </div>
            </main>

            <aside class="right-column">
                <section id="personaCard" class="persona-card persona-state-idle">
                    <div class="persona-header">
                        <div class="persona-title">Persona Visual</div>
                        <div id="personaStateBadge" class="persona-state state-idle">IDLE</div>
                    </div>

                    <div class="persona-visual">
                        <div class="persona-scanline"></div>
                        <img
                            id="personaImage"
                            src="/assets/persona/zero_v1/idle_open.png"
                            alt="ZERO Persona"
                            draggable="false"
                        />
                    </div>

                    <div class="persona-footer">
                        <div class="persona-mini-card">
                            <div class="persona-mini-label">Visual Profile</div>
                            <div class="persona-mini-value">zero_v1</div>
                        </div>
                        <div class="persona-mini-card">
                            <div class="persona-mini-label">Blink</div>
                            <div id="blinkStateValue" class="persona-mini-value">disabled</div>
                        </div>
                    </div>
                </section>
            </aside>
        </div>

        <div class="footer-line">
            ZERO 智能助手 © 2025 All rights reserved.
        </div>
    </div>

    <script>
        const userInput = document.getElementById("userInput");
        const sendBtn = document.getElementById("sendBtn");
        const statusBadge = document.getElementById("statusBadge");
        const modeValue = document.getElementById("modeValue");
        const modelValue = document.getElementById("modelValue");
        const llmStateValue = document.getElementById("llmStateValue");
        const summaryBox = document.getElementById("summaryBox");
        const warningWrapper = document.getElementById("warningWrapper");
        const warningBox = document.getElementById("warningBox");
        const errorWrapper = document.getElementById("errorWrapper");
        const errorBox = document.getElementById("errorBox");
        const resultBox = document.getElementById("resultBox");
        const rawJsonBox = document.getElementById("rawJsonBox");
        const personaCard = document.getElementById("personaCard");
        const personaImage = document.getElementById("personaImage");
        const personaStateBadge = document.getElementById("personaStateBadge");
        const blinkStateValue = document.getElementById("blinkStateValue");

        const PERSONA_FRAMES = {
            open: "/assets/persona/zero_v1/idle_open.png",
            half: "/assets/persona/zero_v1/idle_half.png",
            closed: "/assets/persona/zero_v1/idle_closed.png"
        };

        function preloadPersonaFrames() {
            Object.values(PERSONA_FRAMES).forEach((src) => {
                const img = new Image();
                img.src = src;
            });
        }

        function setPersonaFrame(frameName) {
            const src = PERSONA_FRAMES[frameName] || PERSONA_FRAMES.open;
            personaImage.src = src;
        }

        function setPersonaState(stateText) {
            const rawText = stateText || "idle";
            const lower = rawText.toLowerCase();

            let normalized = "idle";
            let label = "IDLE";

            if (lower.includes("thinking") || lower.includes("請求中") || lower.includes("waiting")) {
                normalized = "thinking";
                label = "THINKING";
            } else if (lower.includes("running") || lower.includes("executing") || lower.includes("queued")) {
                normalized = "running";
                label = "RUNNING";
            } else if (lower.includes("error") || lower.includes("failed") || lower.includes("失敗")) {
                normalized = "error";
                label = "ERROR";
            }

            personaCard.classList.remove(
                "persona-state-idle",
                "persona-state-thinking",
                "persona-state-running",
                "persona-state-error"
            );
            personaCard.classList.add(`persona-state-${normalized}`);

            personaStateBadge.classList.remove(
                "state-idle",
                "state-thinking",
                "state-running",
                "state-error"
            );
            personaStateBadge.classList.add(`state-${normalized}`);
            personaStateBadge.textContent = label;
        }

        function setLoadingState(isLoading) {
            sendBtn.disabled = isLoading;
            sendBtn.textContent = isLoading ? "送出中..." : "送出";

            if (isLoading) {
                setPersonaState("thinking");
            }
        }

        function setStatusBadge(type, text) {
            statusBadge.textContent = text;
            statusBadge.classList.remove("status-success", "status-warning", "status-fail");

            if (type === "success") {
                statusBadge.classList.add("status-success");
                return;
            }

            if (type === "warning") {
                statusBadge.classList.add("status-warning");
                return;
            }

            statusBadge.classList.add("status-fail");
        }

        function getMainResponseText(data) {
            const candidates = [
                data?.content,
                data?.response,
                data?.message,
                data?.final_answer,
                data?.data?.reply,
                data?.data?.response,
                data?.data?.message
            ];

            for (const item of candidates) {
                if (typeof item === "string" && item.trim()) {
                    return item.trim();
                }
            }

            if (data?.response && typeof data.response === "object") {
                return JSON.stringify(data.response, null, 2);
            }

            return "（沒有可顯示的回應文字）";
        }

        function renderResponse(data) {
            const success = Boolean(data && data.success);
            const modeText =
                data && typeof data.mode === "string" && data.mode.trim()
                    ? data.mode
                    : "未知";

            const summaryText =
                data && typeof data.summary === "string" && data.summary.trim()
                    ? data.summary
                    : "沒有摘要資訊。";

            const responseText = getMainResponseText(data);

            const errorText =
                data && typeof data.error === "string" && data.error.trim()
                    ? data.error
                    : "";

            const warningText =
                data && typeof data.warning === "string" && data.warning.trim()
                    ? data.warning
                    : "";

            const modelText =
                data?.meta && typeof data.meta.model === "string" && data.meta.model.trim()
                    ? data.meta.model
                    : "未知";

            const usedFallback = Boolean(data?.meta?.used_fallback);
            const llmUsed = Boolean(data?.meta?.llm_used);

            let llmStateText = "未知";
            let statusType = "fail";
            let statusText = "失敗";

            if (success && usedFallback) {
                llmStateText = "Fallback";
                statusType = "warning";
                statusText = "成功（Fallback）";
            } else if (success && llmUsed) {
                llmStateText = "已連線";
                statusType = "success";
                statusText = "成功";
            } else if (success) {
                llmStateText = "成功";
                statusType = "success";
                statusText = "成功";
            } else {
                llmStateText = "失敗";
                statusType = "fail";
                statusText = "失敗";
            }

            setStatusBadge(statusType, statusText);
            modeValue.textContent = modeText;
            modelValue.textContent = modelText;
            llmStateValue.textContent = llmStateText;
            summaryBox.textContent = summaryText;
            resultBox.textContent = responseText;
            rawJsonBox.textContent = JSON.stringify(data, null, 2);

            if (!success) {
                setPersonaState("error");
            } else if (data?.ui?.system_status) {
                setPersonaState(data.ui.system_status);
            } else {
                setPersonaState("idle");
            }

            if (warningText) {
                warningWrapper.style.display = "block";
                warningBox.textContent = warningText;
            } else {
                warningWrapper.style.display = "none";
                warningBox.textContent = "";
            }

            if (errorText) {
                errorWrapper.style.display = "block";
                errorBox.textContent = errorText;
            } else {
                errorWrapper.style.display = "none";
                errorBox.textContent = "";
            }
        }

        async function sendMessage() {
            const text = userInput.value.trim();

            if (!text) {
                setStatusBadge("fail", "未送出");
                modeValue.textContent = "未知";
                modelValue.textContent = "未知";
                llmStateValue.textContent = "未知";
                summaryBox.textContent = "請先輸入內容。";
                warningWrapper.style.display = "none";
                warningBox.textContent = "";
                errorWrapper.style.display = "none";
                errorBox.textContent = "";
                resultBox.textContent = "請先輸入內容。";
                rawJsonBox.textContent = "{}";
                setPersonaState("idle");
                return;
            }

            setLoadingState(true);
            setStatusBadge("success", "請求中...");
            modeValue.textContent = "等待中";
            modelValue.textContent = "等待中";
            llmStateValue.textContent = "等待中";
            summaryBox.textContent = "等待 ZERO 回應...";
            warningWrapper.style.display = "none";
            warningBox.textContent = "";
            errorWrapper.style.display = "none";
            errorBox.textContent = "";
            resultBox.textContent = "等待 ZERO 回應...";
            rawJsonBox.textContent = "{}";

            try {
                const response = await fetch("/api/chat", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        message: text
                    })
                });

                const data = await response.json();
                renderResponse(data);
            } catch (error) {
                const errorPayload = {
                    success: false,
                    mode: "system",
                    summary: "前端請求失敗。",
                    error: String(error),
                    warning: null,
                    response: "前端請求失敗，請檢查 Flask 是否仍在執行。",
                    meta: {
                        model: null,
                        used_fallback: false,
                        llm_used: false
                    }
                };
                renderResponse(errorPayload);
            } finally {
                setLoadingState(false);
            }
        }

        sendBtn.addEventListener("click", sendMessage);

        userInput.addEventListener("keydown", function (event) {
            if (event.key === "Enter") {
                event.preventDefault();
                sendMessage();
            }
        });

        preloadPersonaFrames();
        setPersonaFrame("open");
        setPersonaState("idle");
        blinkStateValue.textContent = "disabled";
    </script>
</body>
</html>
